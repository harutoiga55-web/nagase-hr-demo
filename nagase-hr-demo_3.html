<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナガセコンテンツ本部 人事書類システム（デモ）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1A6B4A;--gl:#E8F4EE;
  --emp:#1A6B4A;--fre:#7B4FA0;--freL:#F3EEF8;
  --bg:#F5F4F0;--sur:#FFFFFF;--sur2:#FAFAF8;
  --bd:#E2E0D8;--bd2:#C8C5BA;
  --tx:#1C1C1A;--tx2:#4A4A45;--tx3:#8A8A82;
  --info:#EBF2FB;--info-t:#1A5FA8;
  --warn:#FFF3DC;--warn-t:#C67C00;
  --err:#FDECEA;--err-t:#C0392B;
  --ok:#E8F4EE;--ok-t:#1A6B4A;
  --radius-md:8px;--radius-lg:12px;
}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:14px;color:var(--tx);background:var(--bg)}
button{font-family:inherit;cursor:pointer;font-size:13px}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--tx)}

/* LOGIN */
#login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--radius-lg);padding:2rem;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--tx3);margin-bottom:4px}
.login-title{font-size:18px;font-weight:700;margin-bottom:3px}
.login-sub{font-size:12px;color:var(--tx3);margin-bottom:1.5rem}
.ac-card{border:1px solid var(--bd2);border-radius:var(--radius-md);padding:12px 16px;background:var(--sur2);cursor:pointer;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.ac-card:hover{border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}
.ac-card.sel{border-color:var(--g);background:var(--gl)}
.ac-role{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--tx3);margin-bottom:3px}
.ac-name{font-size:14px;font-weight:700}
.ac-email{font-size:11px;color:var(--tx3)}
.login-btn{width:100%;padding:11px;border:none;border-radius:var(--radius-md);background:var(--g);color:#fff;font-size:14px;font-weight:700;margin-top:4px;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.9}
.login-hint{margin-top:10px;padding:10px 12px;border-radius:var(--radius-md);background:var(--sur2);font-size:11px;color:var(--tx3);line-height:1.6}

/* ADMIN LAYOUT */
#admin-app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--tx);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid #2E2E2A}
.sb-logo-sub{font-size:10px;font-weight:700;letter-spacing:2px;color:#888}
.sb-logo-title{font-size:14px;font-weight:700;color:#FFF;line-height:1.4;margin-top:3px}
.sb-nav{flex:1;padding:10px 0}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 18px;border:none;background:transparent;color:#AAA;text-align:left;border-left:3px solid transparent;font-size:13px;transition:all .15s}
.sb-item:hover{background:#2E2E2A;color:#FFF}
.sb-item.active{color:#FFF;border-left-color:var(--g);background:#2E2E2A;font-weight:700}
.sb-footer{padding:12px 18px;border-top:1px solid #2E2E2A}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--tx3);margin-left:10px}
.content{flex:1;overflow-y:auto;padding:20px}

/* CARDS */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:1rem 1.25rem}
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--radius-md);padding:1rem}
.stat-label{font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.stat-val{font-size:24px;font-weight:700}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-emp{background:var(--gl);color:var(--emp)}
.b-fre{background:var(--freL);color:var(--fre)}
.b-new{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd)}
.b-ok{background:var(--ok);color:var(--ok-t)}
.b-info{background:var(--info);color:var(--info-t)}
.b-warn{background:var(--warn);color:var(--warn-t)}
.b-err{background:var(--err);color:var(--err-t)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;color:var(--tx2);border-bottom:1px solid var(--bd2);background:var(--sur2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--sur2);cursor:pointer}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:var(--radius-md);font-size:13px;font-weight:600;border:1px solid var(--bd2);background:var(--sur);color:var(--tx);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--sur2)}
.btn-p{background:var(--g);color:#fff;border-color:var(--g)}
.btn-p:hover{opacity:.9}
.btn-g{border-color:var(--g);color:var(--g);background:transparent}
.btn-g:hover{background:var(--gl)}
.btn-sm{padding:5px 12px;font-size:12px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd2);margin-bottom:16px;gap:4px}
.tab{padding:8px 16px;border:none;background:transparent;font-size:13px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:700}

/* FORM */
.fg label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--radius-md);background:var(--sur2)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--gl)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--tx);color:var(--sur);padding:10px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sur);border-radius:var(--radius-lg);padding:1.75rem;width:440px;border:1px solid var(--bd2);box-shadow:0 8px 32px rgba(0,0,0,.12);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1rem}

/* PROGRESS */
.prog-wrap{height:5px;background:var(--sur2);border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;background:var(--g);border-radius:4px;transition:width .4s}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--bd2);border-radius:var(--radius-lg);padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--g);background:var(--gl)}
.drop-zone.done{border-color:var(--g);background:var(--gl);border-style:solid}

/* SUPPLEMENT */
#supp-app{min-height:100vh;background:var(--bg)}
.supp-topbar{background:var(--sur);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.supp-body{max-width:700px;margin:0 auto;padding:1.5rem}
.supp-prog-bar{height:4px;background:var(--gl);margin-bottom:1.2rem;border-radius:2px;overflow:hidden}
.supp-prog-fill{height:100%;background:var(--g);transition:width .3s}
.supp-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--bd)}

/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--sur);border:1px solid var(--bd2);border-radius:var(--radius-md);z-index:30;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ac-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bd)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--gl)}
.ac-main{font-weight:600}
.ac-sub{font-size:11px;color:var(--tx3);margin-top:1px}

/* DOC CARDS */
.doc-card{border:1px solid var(--bd2);border-radius:var(--radius-md);padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;border-left-width:4px;border-left-style:solid;background:var(--sur)}
.dc-active{border-left-color:var(--info-t)}
.dc-idle{border-left-color:var(--bd)}

/* DL SCREEN */
.dl-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--radius-md);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px}

/* DEPENDENT ROW */
.dep-row{display:grid;grid-template-columns:1fr 1fr 80px auto;gap:8px;align-items:end;padding:10px 12px;background:var(--sur2);border-radius:var(--radius-md);margin-bottom:8px;border:1px solid var(--bd)}
</style>
</head>
<body>

<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   銀行マスタ
============================================================ */
const BANK_MASTER=[
  {code:'0001',name:'みずほ銀行',kana:'ミズホ',branches:[{code:'001',name:'本店'},{code:'010',name:'吉祥寺支店'},{code:'020',name:'渋谷支店'},{code:'030',name:'新宿支店'},{code:'040',name:'池袋支店'}]},
  {code:'0005',name:'三菱UFJ銀行',kana:'ミツビシユーエフジェイ',branches:[{code:'001',name:'本店'},{code:'010',name:'吉祥寺支店'},{code:'020',name:'渋谷支店'},{code:'025',name:'武蔵野支店'},{code:'030',name:'新宿支店'},{code:'035',name:'池袋支店'}]},
  {code:'0009',name:'三井住友銀行',kana:'ミツイスミトモ',branches:[{code:'001',name:'本店'},{code:'015',name:'吉祥寺支店'},{code:'022',name:'渋谷支店'},{code:'035',name:'新宿支店'}]},
  {code:'0010',name:'りそな銀行',kana:'リソナ',branches:[{code:'001',name:'本店'},{code:'012',name:'吉祥寺支店'}]},
  {code:'0033',name:'PayPay銀行',kana:'ペイペイ',branches:[{code:'001',name:'本店'}]},
  {code:'0036',name:'楽天銀行',kana:'ラクテン',branches:[{code:'001',name:'本店'}]},
  {code:'0038',name:'住信SBIネット銀行',kana:'ジュウシンエスビーアイ',branches:[{code:'001',name:'本店'}]},
  {code:'0542',name:'ゆうちょ銀行',kana:'ユウチョ',branches:[{code:'001',name:'本店'}]},
];
function searchBanks(q){if(!q)return[];const ql=q.toLowerCase();return BANK_MASTER.filter(b=>b.name.includes(q)||b.kana.toLowerCase().includes(ql)||b.name.replace('銀行','').includes(q)).slice(0,8);}
function searchBranches(bc,q){const bank=BANK_MASTER.find(b=>b.code===bc);if(!bank)return[];if(!q)return bank.branches.slice(0,8);return bank.branches.filter(b=>b.name.includes(q)||b.name.replace('支店','').includes(q)).slice(0,8);}

/* ============================================================
   書類定義
============================================================ */
const DOC_DEFS=[
  {id:'resume',    label:'履歴書',        icon:'📄',avail:'both',   req:true},
  {id:'bank_info', label:'給与振込依頼書', icon:'🏦',avail:'both',   req:true},
  {id:'pledge',    label:'誓約書',        icon:'✍️',avail:'both',   req:true},
  {id:'employment',label:'雇用条件通知書', icon:'📋',avail:'employee',req:true},
  {id:'dependent', label:'扶養控除申告書', icon:'📑',avail:'employee',req:false},
];
function visDocs(ct){return DOC_DEFS.filter(d=>d.avail==='both'||d.avail===ct);}

const EXCEL_PREVIEW=[
  {id:'u_x01',ln:'山田',fn:'一郎',lnk:'ヤマダ',fnk:'イチロウ',email:'yamada@example.com',ct:'employee',st:'new',store:null,date:'2026-03-15',univ:'東京大学',dept:'工学部',grade:'3',introducer:'社員紹介'},
  {id:'u_x02',ln:'佐々木',fn:'麻衣',lnk:'ササキ',fnk:'マイ',email:'sasaki@example.com',ct:'freelance',st:'new',store:null,date:'2026-03-15',univ:'早稲田大学',dept:'文学部',grade:'4',introducer:'東進HPより'},
  {id:'u_x03',ln:'中村',fn:'翔太',lnk:'ナカムラ',fnk:'ショウタ',email:'nakamura@example.com',ct:'employee',st:'new',store:null,date:'2026-03-15',univ:'慶應義塾大学',dept:'法学部',grade:'2',introducer:'社員紹介'},
];

const STATUS_MAP={
  new:{label:'新規',cls:'b-new'},screening:{label:'選考中',cls:'b-warn'},
  accepted:{label:'採用決定',cls:'b-info'},supplement_sent:{label:'補完URL送付済',cls:'b-warn'},
  supplement_done:{label:'補完入力完了',cls:'b-ok'},
  docs_ready:{label:'書類DL可能',cls:'b-ok'},
  rejected:{label:'不採用',cls:'b-err'},
};

const sharedState={
  suppData:{
    ln:'田中',fn:'花子',lnk:'タナカ',fnk:'ハナコ',
    address:'東京都武蔵野市吉祥寺南町2-1-1',tel:'090-1234-5678',birth:'2004年4月15日',email:'hanako@example.com',
    emergency_name:'田中　太郎',emergency_rel:'父',emergency_tel:'0422-00-0000',emergency_addr:'東京都武蔵野市吉祥寺北町1-1-1',
    bank_name:'',bank_code:'',branch_name:'',branch_code:'',account_type:'普通',account_no:'',
    edu:'2022年4月 東京大学文学部国文学科 入学（在学中）',jobs:'なし',licenses:'普通自動車第一種免許',
    motivation:'貴社の教育事業に強く共感し、自身の国語の知識を活かしたいと考え志望しました。',
    guarantor_name:'田中　太郎',guarantor_rel:'父',guarantor_addr:'東京都武蔵野市吉祥寺北町1-1-1',guarantor_birth:'1968年6月1日',
    spouse:false,spouse_name:'',spouse_birth:'',dependents:[],
  },
};

let S={
  screen:'login',adminNav:'dashboard',selectedId:null,
  applicants:[
    {id:'1',ln:'田中',fn:'花子',lnk:'タナカ',fnk:'ハナコ',email:'hanako@example.com',ct:'employee',st:'accepted',store:'本郷校',date:'2026-03-10',univ:'東京大学',dept:'文学部',grade:'3',introducer:'社員紹介'},
    {id:'2',ln:'佐藤',fn:'太郎',lnk:'サトウ',fnk:'タロウ',email:'taro@example.com',ct:'freelance',st:'new',store:null,date:'2026-03-11',univ:'慶應大学',dept:'経済学部',grade:'4',introducer:'東進HPより'},
    {id:'3',ln:'鈴木',fn:'美咲',lnk:'スズキ',fnk:'ミサキ',email:'misaki@example.com',ct:'employee',st:'docs_ready',store:'吉祥寺校',date:'2026-03-09',univ:'早稲田大学',dept:'教育学部',grade:'3',introducer:'社員紹介'},
    {id:'4',ln:'山本',fn:'健二',lnk:'ヤマモト',fnk:'ケンジ',email:'kenji@example.com',ct:'freelance',st:'supplement_sent',store:'渋谷校',date:'2026-03-08',univ:'東京大学',dept:'理学部',grade:'2',introducer:'東進HPより'},
  ],
  keywords:[{id:'1',kw:'社員紹介',active:true},{id:'2',kw:'STAFF2026',active:true},{id:'3',kw:'インターン',active:false}],
  loginSel:'admin',detailTab:'basic',modalOpen:false,ctModalId:null,
  suppStep:0,appSearch:'',ctFilter:'all',
  // bank autocomplete handled inline
  importFile:null,importPreview:false,importDone:false,
};

const root=document.getElementById('root');

function emit(type,p){
  switch(type){
    case 'login-sel': S.loginSel=p; break;
    case 'login':
      S.screen=S.loginSel==='admin'?'admin':'supplement';
      S.suppStep=0; break;
    case 'logout':
      S.screen='login';S.suppStep=0;
      S.importFile=null;S.importPreview=false;S.importDone=false; break;
    case 'nav': S.adminNav=p;S.selectedId=null; break;
    case 'select': S.selectedId=p;S.adminNav='detail'; break;
    case 'tab': S.detailTab=p; break;
    case 'status-change':{const a=S.applicants.find(x=>x.id===S.selectedId);if(a)a.st=p;toast('ステータスを更新しました');break;}
    case 'modal-open': S.modalOpen=true; break;
    case 'modal-close': S.modalOpen=false; break;
    case 'send-url':{S.modalOpen=false;const a=S.applicants.find(x=>x.id===S.selectedId);if(a)a.st='supplement_sent';toast('補完フォームURLを送付しました');break;}
    case 'ct-modal-open': S.ctModalId=p; break;
    case 'ct-modal-close': S.ctModalId=null; break;
    case 'ct-change':{const a=S.applicants.find(x=>x.id===S.ctModalId);if(a)a.ct=p;S.ctModalId=null;toast('雇用形態を変更しました');break;}
    case 'import-file': S.importFile=p;S.importPreview=true; break;
    case 'import-exec':
      EXCEL_PREVIEW.forEach(r=>{if(!S.applicants.find(x=>x.id===r.id))S.applicants.push({...r});});
      S.importDone=true;toast('3件の応募者を取り込みました'); break;
    case 'import-reset': S.importFile=null;S.importPreview=false;S.importDone=false; break;
    case 'toggle-kw':{const k=S.keywords.find(x=>x.id===p);if(k)k.active=!k.active;break;}
    case 'delete-kw': S.keywords=S.keywords.filter(x=>x.id!==p); break;
    case 'add-kw':{const v=document.getElementById('new-kw')?.value?.trim();if(v)S.keywords.push({id:Date.now()+'',kw:v,active:true});break;}
    case 'search': S.appSearch=p; break;
    case 'ct-filter': S.ctFilter=p; break;
    // bank/branch selection handled inline in renderStep1
    case 'dep-add': sharedState.suppData.dependents.push({name:'',birth:'',relation:''}); break;
    case 'dep-remove': sharedState.suppData.dependents.splice(p,1); break;
    case 'supp-next':
      if(S.suppStep<5)S.suppStep++;
      else{const a=S.applicants.find(x=>x.id==='1');if(a)a.st='docs_ready';S.screen='supp-done';}break;
    case 'supp-back': if(S.suppStep>0)S.suppStep--; break;
    case 'dl-doc': toast(p+' をダウンロードしました（デモ：実装時はPDFが生成されます）'); break;
    case 'dl-all': toast('全書類をZIPでダウンロードしました（デモ）'); break;
  }
  render();
}

function toast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ── ヘルパー ── */
function badge(ct){return `<span class="badge ${ct==='employee'?'b-emp':'b-fre'}">${ct==='employee'?'臨時従業員':'業務委託'}</span>`;}
function sbadge(st){const s=STATUS_MAP[st]||STATUS_MAP.new;return `<span class="badge ${s.cls}">${s.label}</span>`;}
function field(lbl,val){return `<div style="background:var(--sur2);border:1px solid var(--bd);border-radius:var(--radius-md);padding:9px 12px"><div style="font-size:11px;color:var(--tx3);margin-bottom:2px;font-weight:600">${lbl}</div><div style="font-size:13px">${val||'─'}</div></div>`;}
function inp(val,handler,ph=''){return `<input value="${val}" placeholder="${ph}" autocomplete="off" oninput="${handler}" style="width:100%;padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--radius-md);background:var(--sur2)">`;}

/* ============================================================
   ADMIN
============================================================ */
function renderSidebar(){
  const cur=S.adminNav==='detail'?'applicants':S.adminNav;
  const navs=[
    {id:'dashboard',ic:'⊞',lbl:'ダッシュボード'},
    {id:'applicants',ic:'◉',lbl:'応募者一覧'},
    {id:'import',   ic:'↓',lbl:'Excel取込'},
    {id:'settings', ic:'⚙',lbl:'設定'},
  ];
  return `<div class="sidebar">
<div class="sb-logo">
  <div class="sb-logo-sub">NAGASE</div>
  <div class="sb-logo-title">人事書類<br>自動化システム</div>
</div>
<nav class="sb-nav">
  ${navs.map(n=>`<button class="sb-item ${cur===n.id?'active':''}" onclick="emit('nav','${n.id}')">
    <span style="font-size:16px;width:20px;text-align:center">${n.ic}</span>${n.lbl}
  </button>`).join('')}
</nav>

/* 銀行オートコンプリート用グローバル関数（render()不要） */
function handleBankInput(val){
  sharedState.suppData.bank_name=val;
  sharedState.suppData.bank_code='';
  sharedState.suppData.branch_name='';
  sharedState.suppData.branch_code='';
  const list=document.getElementById('bank-list');
  if(!list) return;
  const suggs=searchBanks(val);
  if(!val||!suggs.length){ list.style.display='none'; return; }
  list.innerHTML=suggs.map(b=>
    `<div class="ac-item" onmousedown="event.preventDefault();selectBank('${b.code}')">`+
    `<div class="ac-main">${b.name}</div>`+
    `<div class="ac-sub">金融機関コード: ${b.code}</div></div>`
  ).join('');
  list.style.display='block';
}

function selectBank(code){
  const b=BANK_MASTER.find(x=>x.code===code);
  if(!b) return;
  sharedState.suppData.bank_name=b.name;
  sharedState.suppData.bank_code=b.code;
  sharedState.suppData.branch_name='';
  sharedState.suppData.branch_code='';
  const list=document.getElementById('bank-list');
  if(list){ list.style.display='none'; }
  const inp=document.getElementById('bank-inp');
  if(inp){ inp.value=b.name; inp.style.borderColor='var(--g)'; }
  const ok=document.getElementById('bank-ok');
  if(ok){ ok.textContent='✓ 金融機関コード: '+b.code+' が設定されました'; ok.style.display=''; }
  const branchInp=document.getElementById('branch-inp');
  if(branchInp){ branchInp.disabled=false; branchInp.style.opacity='1'; branchInp.style.background='var(--sur2)'; branchInp.placeholder='例：吉祥寺、新宿'; branchInp.focus(); }
}

function handleBranchInput(val){
  sharedState.suppData.branch_name=val;
  sharedState.suppData.branch_code='';
  const list=document.getElementById('branch-list');
  if(!list) return;
  const suggs=searchBranches(sharedState.suppData.bank_code, val);
  if(!val||!suggs.length){ list.style.display='none'; return; }
  const bc=sharedState.suppData.bank_code;
  list.innerHTML=suggs.map(b=>
    `<div class="ac-item" onmousedown="event.preventDefault();selectBranch('${bc}','${b.code}')">`+
    `<div class="ac-main">${b.name}</div>`+
    `<div class="ac-sub">支店コード: ${b.code}</div></div>`
  ).join('');
  list.style.display='block';
}

function selectBranch(bankCode, branchCode){
  const bank=BANK_MASTER.find(x=>x.code===bankCode);
  const br=bank&&bank.branches.find(x=>x.code===branchCode);
  if(!br) return;
  sharedState.suppData.branch_name=br.name;
  sharedState.suppData.branch_code=br.code;
  const list=document.getElementById('branch-list');
  if(list){ list.style.display='none'; }
  const inp=document.getElementById('branch-inp');
  if(inp){ inp.value=br.name; inp.style.borderColor='var(--g)'; }
  const ok=document.getElementById('branch-ok');
  if(ok){ ok.textContent='✓ 支店コード: '+br.code+' が設定されました'; ok.style.display=''; }
}

<div class="login-box">
  <div class="login-logo">NAGASE</div>
  <div class="login-title">人事書類自動化システム</div>
  <div class="login-sub">デモアカウントを選択してログインしてください</div>

  ${[
    {id:'admin',role:'管理者',name:'人事部　管理者',email:'hr-admin@nagase.co.jp',desc:'応募者管理・Excel取込・書類DL'},
    {id:'supp', role:'応募者',name:'田中　花子',    email:'hanako@example.com',   desc:'補完フォーム入力・書類PDF DL'},
  ].map(a=>`
  <div class="ac-card ${S.loginSel===a.id?'sel':''}" onclick="emit('login-sel','${a.id}')">
    <div class="ac-role">${a.role.toUpperCase()}</div>
    <div class="ac-name">${a.name}</div>
    <div class="ac-email">${a.email}</div>
  </div>`).join('')}

  <div class="login-hint">
    ${S.loginSel==='admin'?'📋 管理者：Excel取込・応募者管理・雇用形態変更・書類ダウンロード':'📝 応募者：6ステップで情報入力 → 書類PDF即ダウンロード'}
  </div>
  <button class="login-btn" onclick="emit('login')">ログイン</button>

  <div style="margin-top:16px;padding:12px;background:var(--info);border-radius:var(--radius-md);font-size:11px;color:var(--info-t);line-height:1.7;text-align:center">
    ⚠️ これはデモ版です。データは保存されません。<br>PDFの実生成・メール送信は本番実装時に対応します。
  </div>
</div>
</div>`;
}

function render(){
  if(S.screen==='login')       root.innerHTML = renderLogin();
  else if(S.screen==='admin')  root.innerHTML = renderAdmin();
  else if(S.screen==='supplement') root.innerHTML = renderSupplement();
  else if(S.screen==='supp-done')  root.innerHTML = renderSuppDone();
}

render();
</script>
</body>
</html>
